<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/static/css/login_style.css" />
  </head>
  <body>
    <div class="login-page" id="login-page-id">
      <div class="login">
        <div class="login-heading">
          <div class="logo">
            <img src="/static/images/Digital Farming.png" alt="LOGO" />
          </div>
          <!-- <h2 class="registerHeading">AggroAssist</h2> -->
          <br />
        </div>
        <form action="/login" method="post">
          <div class="username-email-option">
            <input
              class=""
              type="text"
              name="username-or-email"
              placeholder="Username or E-mail"
              id="email-username-input"
              required
            />

            <div class="choice-option">
              <div class="username-option">
                <input 
                type="radio" 
                style="margin-right: 5px" 
                name="username-email-choice"
                id="username-radio"
                value="Username"
                checked
                />
                <label for="username-radio">Username</label>
              </div>
              <div class="email-option">
                <input 
                type="radio" 
                style="margin-right: 5px"
                name="username-email-choice"
                id="email-radio"
                value="Email"
                 /> <label for="email-radio">E-mail</label> 
              </div>
            </div>
          </div>

          <input
            class="inputs"
            type="password"
            name="password"
            placeholder="Password"
            required
          />

          <div class="login-btn-div">
            <button class="login-btn">Sign In</button>
          </div>
          <div class="register-route">
            <p>
              Don't have an account?
              <a id="Sign-Up" href="/register">Sign Up</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
